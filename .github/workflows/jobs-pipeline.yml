name: Jobs Pipeline

on:
  schedule:
    - cron: "0 7 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      RAPIDAPI_HOST: linkedin-job-search-api.p.rapidapi.com
      RAPIDAPI_BASE_URL: https://linkedin-job-search-api.p.rapidapi.com
      LINKEDIN_LIMIT: "100"
      LINKEDIN_MAX_REQUESTS: "10"

      ACTIVE_JOBS_HOST: active-jobs-db.p.rapidapi.com
      ACTIVE_JOBS_BASE_URL: https://active-jobs-db.p.rapidapi.com
      ACTIVE_JOBS_LIMIT: "100"
      ACTIVE_JOBS_MAX_REQUESTS: "10"
      ACTIVE_JOBS_ENDPOINT_PATH: active-ats-7d
      ACTIVE_JOBS_QUERY_FILE: queries/active_jobs_greg_v1.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run jobs pipeline
        run: node src/run-pipeline.js

      - name: Commit updated inbox file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/inbox_latest.json
          git diff --cached --quiet || git commit -m "chore: refresh jobs inbox"

      - name: Push changes
        run: git push origin HEAD:main
