name: Jobs Pipeline

on:
  schedule:
    # 2:00 AM and 2:00 PM Eastern (approx; adjust for DST if needed)
    - cron: "0 7 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run jobs pipeline
        run: node src/run-pipeline.js

      - name: Commit updated inbox file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/inbox_latest.json
          git diff --cached --quiet || git commit -m "chore: refresh jobs inbox"

      - name: Push changes
        run: |
          git push origin HEAD:main
